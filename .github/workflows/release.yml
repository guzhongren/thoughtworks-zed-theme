name: Publish to zed-industries/extensions

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: huacnlee/zed-extension-action@v1
        with:
          extension-name: thoughtworks-styled-theme
          push-to: guzhongren/extensions
        env:
          COMMITTER_TOKEN: ${{ secrets.ZED_EXTENSION_COMMITTER_TOKEN }}
